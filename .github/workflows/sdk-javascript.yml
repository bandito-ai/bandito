name: SDK (JavaScript)

on:
  push:
    paths:
      - "sdks/javascript/**"
      - "engine/**"
      - ".github/workflows/sdk-javascript.yml"
  pull_request:
    paths:
      - "sdks/javascript/**"
      - "engine/**"
      - ".github/workflows/sdk-javascript.yml"

jobs:
  test:
    name: JS SDK tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sdks/javascript/pnpm-lock.yaml

      # Build WASM first (JS SDK depends on engine/pkg/)
      - name: Build WASM engine
        working-directory: engine
        run: |
          cargo install wasm-pack
          wasm-pack build --target nodejs --out-dir pkg --features wasm

      # Install and test JS SDK
      - name: Install and test
        working-directory: sdks/javascript
        run: |
          pnpm install
          pnpm test
